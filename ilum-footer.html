<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Satoshi', 'Inter', sans-serif;
}

/* ─────────────────────────────────────
   FOOTER SHELL
───────────────────────────────────── */
.footer {
  position: relative;
  width: 100%; height: 100vh;
  overflow: hidden;
  transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer;
}

/* ─────────────────────────────────────
   MAX WIDTH CONTAINER — matches Wix 1600px
───────────────────────────────────── */
.container {
  max-width: 1600px;
  margin: 0 auto;
  height: 100%;
  padding: 0 48px;
  display: flex;
  flex-direction: column;
}

/* ─────────────────────────────────────
   BG ILUM WORDMARK
───────────────────────────────────── */
.bg-ilum-wrap {
  position: absolute;
  bottom: -2%; left: 0;
  width: 100%;
  pointer-events: none;
  user-select: none;
}
.bg-ilum-wrap svg { width: 100%; height: auto; display: block; }
.ilum-path { transition: fill 1.1s cubic-bezier(0.4, 0, 0.2, 1); }

/* ─────────────────────────────────────
   MAIN LAYOUT — two column grid
───────────────────────────────────── */
.footer-inner {
  position: relative;
  z-index: 1;
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr auto;
  padding: 44px 0 0;
}

/* ─────────────────────────────────────
   HEADLINE — top left
───────────────────────────────────── */
.headline-wrap {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  align-items: flex-start;
}
.headline {
  font-weight: 300;
  /* 52px at 1920px baseline: 52/1920 = 2.708vw */
  font-size: clamp(28px, 2.708vw, 52px);
  line-height: 1.08;
  letter-spacing: -0.025em;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─────────────────────────────────────
   CONTACT BLOCK — centre right
───────────────────────────────────── */
.contact-block {
  grid-column: 2;
  grid-row: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-left: 24px;
}
.info-name {
  /* 16px at 1920px: 16/1920 = 0.833vw */
  font-size: clamp(11px, 0.833vw, 16px);
  font-weight: 700;
  letter-spacing: 0.01em;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.info-tagline {
  font-size: clamp(11px, 0.833vw, 16px);
  font-weight: 300;
  margin-top: 2px;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.divider {
  width: 100%; height: 1px;
  margin: 12px 0 14px;
  transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.contact-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
}
.contact-col { display: flex; flex-direction: column; gap: 2px; }
.contact-label {
  font-family: 'DM Mono', monospace;
  /* 13px at 1920px: 13/1920 = 0.677vw */
  font-size: clamp(9px, 0.677vw, 13px);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 5px;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.contact-val {
  font-weight: 300;
  font-size: clamp(9px, 0.677vw, 13px);
  text-decoration: none;
  line-height: 1.65;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
}
.contact-val:hover { opacity: 0.55; }

/* ─────────────────────────────────────
   BOTTOM STRIP — full width, last row
───────────────────────────────────── */
.bottom-strip {
  grid-column: 1 / 3;
  grid-row: 2;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  padding-bottom: 28px;
  padding-top: 16px;
}

/* Logo SVG — exact Figma size, scales with viewport */
.logo-svg {
  /* 209px wide at 1920px = 10.885vw */
  width: clamp(120px, 10.885vw, 209px);
  height: auto;
  flex-shrink: 0;
}
.logo-fill   { transition: fill   1.1s cubic-bezier(0.4, 0, 0.2, 1); }
.logo-stroke { transition: stroke 1.1s cubic-bezier(0.4, 0, 0.2, 1); }

.copyright {
  font-family: 'DM Mono', monospace;
  font-size: clamp(8px, 0.573vw, 11px);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  opacity: 0.5;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─────────────────────────────────────
   HINT
───────────────────────────────────── */
.hint {
  position: absolute;
  bottom: 32px; left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s, color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}
.hint.show { opacity: 0.3; }

/* ─────────────────────────────────────
   TABLET ≤ 960px
───────────────────────────────────── */
@media (max-width: 960px) {
  .container { padding: 0 32px; }
  .footer-inner {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr;
    padding: 32px 0 0;
    gap: 24px 0;
  }
  .headline-wrap { grid-column: 1; grid-row: 1; }
  .contact-block {
    grid-column: 1; grid-row: 2;
    padding-left: 0;
    justify-content: flex-start;
  }
  .contact-grid { grid-template-columns: 1fr 1fr; gap: 16px 12px; }
  .bottom-strip { grid-column: 1; grid-row: 3; }
  .headline { font-size: clamp(28px, 4.5vw, 48px); }
}

/* ─────────────────────────────────────
   MOBILE ≤ 600px
───────────────────────────────────── */
@media (max-width: 600px) {
  .container { padding: 0 20px; }
  .footer-inner { padding: 24px 0 0; gap: 20px 0; }
  .headline { font-size: clamp(26px, 7.5vw, 40px); }
  .contact-grid { grid-template-columns: 1fr 1fr; gap: 14px 8px; }
  .bottom-strip { flex-direction: column; align-items: flex-start; gap: 16px; padding-bottom: 20px; }
  .logo-svg { width: clamp(100px, 40vw, 160px); }
}
</style>

<script>
var THEMES = [
  { name:'black',    bg:'#0a0a0a', fg:'#ffffff', fgM:'rgba(255,255,255,0.50)', border:'rgba(255,255,255,0.16)', logofill:'#dfdfdf', bgIlum:'#1c1c1c' },
  { name:'cyan',     bg:'#29bde0', fg:'#ffffff', fgM:'rgba(255,255,255,0.70)', border:'rgba(255,255,255,0.35)', logofill:'#ffffff', bgIlum:'#1faac9' },
  { name:'magenta',  bg:'#e520e5', fg:'#ffffff', fgM:'rgba(255,255,255,0.70)', border:'rgba(255,255,255,0.35)', logofill:'#ffffff', bgIlum:'#cc18cc' },
  { name:'sand',     bg:'#ddd9b8', fg:'#1e1e3a', fgM:'rgba(30,30,58,0.52)',   border:'rgba(30,30,58,0.20)',   logofill:'#1e1e3a', bgIlum:'#cac6a4' },
  { name:'electric', bg:'#2200ff', fg:'#ffec00', fgM:'rgba(255,236,0,0.62)',   border:'rgba(255,236,0,0.28)',  logofill:'#ffec00', bgIlum:'#1800e0' },
];

var current = 0;

function applyTheme(idx) {
  var t = THEMES[idx];
  document.getElementById('footer').style.background    = t.bg;
  document.getElementById('headline').style.color       = t.fg;
  document.getElementById('infoName').style.color       = t.fg;
  document.getElementById('infoTagline').style.color    = t.fgM;
  document.getElementById('divider').style.background   = t.border;
  document.getElementById('copyright').style.color      = t.fgM;
  document.getElementById('hint').style.color           = t.fgM;
  document.querySelectorAll('.contact-label').forEach(function(el){ el.style.color = t.fgM; });
  document.querySelectorAll('.contact-val').forEach(function(el){   el.style.color = t.fg;  });
  document.querySelectorAll('.logo-fill').forEach(function(el){     el.setAttribute('fill',   t.logofill); });
  document.querySelectorAll('.logo-stroke').forEach(function(el){   el.setAttribute('stroke', t.logofill); });
  document.querySelectorAll('.ilum-path').forEach(function(el){     el.setAttribute('fill',   t.bgIlum);   });
  current = idx;
}

function advance() { applyTheme((current + 1) % THEMES.length); }

// Click
document.getElementById('footer').addEventListener('click', advance);

// Wheel
var wheelAccum = 0;
document.addEventListener('wheel', function(e) {
  e.preventDefault();
  wheelAccum += Math.abs(e.deltaY);
  if (wheelAccum >= 80) { wheelAccum = 0; advance(); }
}, { passive: false });

// Swipe
var touchStartY = null;
document.addEventListener('touchstart', function(e){ touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', function(e) {
  if (touchStartY === null) return;
  if (Math.abs(touchStartY - e.changedTouches[0].clientY) >= 36) advance();
  touchStartY = null;
}, { passive: true });

// Hint
applyTheme(0);
var hintEl = document.getElementById('hint');
setTimeout(function(){ hintEl.classList.add('show'); }, 1500);
setTimeout(function(){ hintEl.classList.remove('show'); }, 4500);
</script>
