<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ILUM — Footer</title>
<!-- Satoshi via Fontshare CDN -->
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@300,400,700&display=swap" rel="stylesheet">
<!-- DM Mono via Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Satoshi', 'Inter', sans-serif;
}

/* ─────────────────────────────────────
   FOOTER SHELL
───────────────────────────────────── */
.footer {
  position: relative;
  width: 100%; height: 100vh;
  overflow: hidden;
  transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  cursor: pointer; /* whole footer is clickable to advance */
}

/* ─────────────────────────────────────
   BACKGROUND ILUM WORDMARK
───────────────────────────────────── */
.bg-ilum-wrap {
  position: absolute;
  bottom: -2%; left: -1%;
  width: 106%;
  pointer-events: none;
  user-select: none;
}
.bg-ilum-wrap svg { width: 100%; height: auto; display: block; }
.ilum-path { transition: fill 1.1s cubic-bezier(0.4, 0, 0.2, 1); }

/* ─────────────────────────────────────
   MAIN GRID
   Two columns: headline left, contact right
   Three rows: top-pad / content / bottom-strip
───────────────────────────────────── */
.footer-inner {
  position: relative;
  z-index: 1;
  width: 100%; height: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr auto auto;
  padding: 0 48px 28px;
  /* row labels: [top] [contact] [bottom] */
}

/* ─────────────────────────────────────
   HEADLINE — top-left, anchored top
───────────────────────────────────── */
.headline-wrap {
  grid-column: 1;
  grid-row: 1;
  display: flex;
  align-items: flex-start;
  padding-top: 44px;
}

.headline {
  font-weight: 300;
  /* 72px at 1450px wide reference ≈ 4.97vw; clamp for safety */
  font-size: clamp(36px, 4.96vw, 80px);
  line-height: 1.06;
  letter-spacing: -0.025em;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─────────────────────────────────────
   CONTACT BLOCK — mid-right
───────────────────────────────────── */
.contact-block {
  grid-column: 2;
  grid-row: 1 / 3; /* spans top and contact rows */
  display: flex;
  flex-direction: column;
  justify-content: center;
  padding-top: 44px;
  padding-left: 24px;
}

.info-name {
  font-weight: 700;
  font-size: clamp(11px, 0.9vw, 14px);
  letter-spacing: 0.01em;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.info-tagline {
  font-weight: 300;
  font-size: clamp(11px, 0.9vw, 14px);
  margin-top: 1px;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

.divider {
  width: 100%; height: 1px;
  margin: 12px 0 14px;
  transition: background 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

.contact-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 0;
}
.contact-col { display: flex; flex-direction: column; gap: 2px; }

.contact-label {
  font-family: 'DM Mono', monospace;
  font-size: clamp(8px, 0.65vw, 10px);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  margin-bottom: 5px;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}
.contact-val {
  font-weight: 300;
  font-size: clamp(10px, 0.8vw, 13px);
  text-decoration: none;
  line-height: 1.65;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s;
}
.contact-val:hover { opacity: 0.55; }

/* ─────────────────────────────────────
   BOTTOM STRIP — spans full width
───────────────────────────────────── */
.bottom-strip {
  grid-column: 1 / 3;
  grid-row: 3;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-top: 16px;
}

/* Full logo (desktop) */
.logo-full  { display: block; }
.logo-small { display: none; }

/* Logo SVG sizing */
.logo-svg {
  height: 88px;
  width: auto;
}
.logo-fill   { transition: fill   1.1s cubic-bezier(0.4, 0, 0.2, 1); }
.logo-stroke { transition: stroke 1.1s cubic-bezier(0.4, 0, 0.2, 1); }

.copyright {
  font-family: 'DM Mono', monospace;
  font-size: clamp(8px, 0.62vw, 10px);
  letter-spacing: 0.09em;
  text-transform: uppercase;
  opacity: 0.5;
  transition: color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
}

/* ─────────────────────────────────────
   INTERACTION HINT
───────────────────────────────────── */
.hint {
  position: absolute;
  bottom: 28px; left: 50%;
  transform: translateX(-50%);
  font-family: 'DM Mono', monospace;
  font-size: 9px; letter-spacing: 0.12em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.6s, color 1.1s cubic-bezier(0.4, 0, 0.2, 1);
  white-space: nowrap;
}
.hint.show { opacity: 0.35; }

/* ─────────────────────────────────────
   TABLET
───────────────────────────────────── */
@media (max-width: 960px) {
  .footer-inner {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr auto;
    padding: 32px 32px 22px;
  }
  .headline-wrap {
    grid-column: 1; grid-row: 1;
    padding-top: 0;
  }
  .contact-block {
    grid-column: 1; grid-row: 2;
    padding-left: 0;
    padding-top: 28px;
    justify-content: flex-start;
  }
  .contact-grid { grid-template-columns: 1fr 1fr; gap: 18px 12px; }
  .bottom-strip { grid-column: 1; grid-row: 4; }
}

/* ─────────────────────────────────────
   MOBILE — swap to small logo
───────────────────────────────────── */
@media (max-width: 600px) {
  .footer-inner { padding: 24px 20px 18px; }
  .headline { font-size: clamp(28px, 8.5vw, 44px); }
  .contact-grid { grid-template-columns: 1fr 1fr; gap: 14px 8px; }
  .logo-full  { display: none; }
  .logo-small { display: block; }
  .logo-svg   { height: 56px; }
  .bottom-strip { padding-top: 12px; }
}
</style>
</head>

</div><!-- /footer -->

<script>
// ══════════════════════════════════════
// THEMES
// ══════════════════════════════════════
var THEMES = [
  { name:'black',   bg:'#0a0a0a', fg:'#ffffff', fgM:'rgba(255,255,255,0.50)', border:'rgba(255,255,255,0.16)', logofill:'#dfdfdf', bgIlum:'#1c1c1c' },
  { name:'cyan',    bg:'#29bde0', fg:'#ffffff', fgM:'rgba(255,255,255,0.70)', border:'rgba(255,255,255,0.35)', logofill:'#ffffff', bgIlum:'#1faac9' },
  { name:'magenta', bg:'#e520e5', fg:'#ffffff', fgM:'rgba(255,255,255,0.70)', border:'rgba(255,255,255,0.35)', logofill:'#ffffff', bgIlum:'#cc18cc' },
  { name:'sand',    bg:'#ddd9b8', fg:'#1e1e3a', fgM:'rgba(30,30,58,0.52)',   border:'rgba(30,30,58,0.20)',   logofill:'#1e1e3a', bgIlum:'#cac6a4' },
  { name:'electric',bg:'#2200ff', fg:'#ffec00', fgM:'rgba(255,236,0,0.62)',   border:'rgba(255,236,0,0.28)',  logofill:'#ffec00', bgIlum:'#1800e0' },
];

var current = 0;

// ══════════════════════════════════════
// APPLY THEME
// ══════════════════════════════════════
function applyTheme(idx) {
  var t = THEMES[idx];
  document.getElementById('footer').style.background = t.bg;
  document.getElementById('headline').style.color    = t.fg;
  document.getElementById('infoName').style.color    = t.fg;
  document.getElementById('infoTagline').style.color = t.fgM;
  document.getElementById('divider').style.background= t.border;
  document.getElementById('copyright').style.color   = t.fgM;
  document.getElementById('hint').style.color        = t.fgM;

  document.querySelectorAll('.contact-label').forEach(function(el){ el.style.color = t.fgM; });
  document.querySelectorAll('.contact-val').forEach(function(el){   el.style.color = t.fg;  });
  document.querySelectorAll('.logo-fill').forEach(function(el){     el.setAttribute('fill',   t.logofill); });
  document.querySelectorAll('.logo-stroke').forEach(function(el){   el.setAttribute('stroke', t.logofill); });
  document.querySelectorAll('.ilum-path').forEach(function(el){     el.setAttribute('fill',   t.bgIlum);   });

  current = idx;
}

function advance() {
  applyTheme((current + 1) % THEMES.length);
}

// ══════════════════════════════════════
// INTERACTIONS — click, wheel, swipe
// ══════════════════════════════════════
var hintShown   = false;
var hintTimeout = null;

function showHint() {
  if (hintShown) return;
  var h = document.getElementById('hint');
  h.classList.add('show');
  hintTimeout = setTimeout(function(){ h.classList.remove('show'); }, 3000);
  hintShown = true;
}

// Click / tap anywhere → advance
document.getElementById('footer').addEventListener('click', function() {
  advance();
});

// Wheel → advance (debounced)
var wheelAccum = 0;
document.addEventListener('wheel', function(e) {
  e.preventDefault();
  wheelAccum += Math.abs(e.deltaY);
  if (wheelAccum >= 80) { wheelAccum = 0; advance(); }
}, { passive: false });

// Touch swipe
var touchStartY = null;
document.addEventListener('touchstart', function(e){ touchStartY = e.touches[0].clientY; }, { passive: true });
document.addEventListener('touchend', function(e) {
  if (touchStartY === null) return;
  if (Math.abs(touchStartY - e.changedTouches[0].clientY) >= 36) advance();
  touchStartY = null;
}, { passive: true });

// ══════════════════════════════════════
// INIT
// ══════════════════════════════════════
applyTheme(0);
// Show hint after 1.5s
setTimeout(showHint, 1500);
</script>
